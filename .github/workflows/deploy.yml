name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write   # ✅ IMPORTANT

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build docs
        run: npm run docs:build   # ✅ IMPORTANT (not npm run build)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # ✅ FIX
          publish_dir: docs/.vitepress/dist